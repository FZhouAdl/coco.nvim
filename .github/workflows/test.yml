name: Test

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        nvim-version: [stable, nightly]
    steps:
      - uses: actions/checkout@v4
      - uses: MunifTanjim/setup-neovim-action@v1
        with:
          tag: ${{ matrix.nvim-version }}
      - name: Run tests
        run: |
          make test
